post:
  summary: Оплата заказа
  operationId: payOrder
  parameters:
    - $ref: '../params/order_uuid.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/pay_order_request.yaml'
  responses:
    '200':
      description: Успешная оплата
      content:
        application/json:
          schema:
            $ref: '../components/pay_order_response.yaml'
    '400':
      description: Неверный статус заказа для проведения оплаты
      content:
        application/json:
          schema:
            $ref: '../components/errors/bad_request_error.yaml'
    '404':
      description: Заказ не найден
      content:
        application/json:
          schema:
            $ref: '../components/errors/not_found_error.yaml'
    '500':
      description: Непредвиденная ошибка со стороны сервера
      content:
        application/json:
          schema:
            $ref: '../components/errors/internal_server_error.yaml'
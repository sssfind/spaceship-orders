openapi: 3.0.3
info:
  title: Order Service API
  version: 1.0.0
  description: API для управления заказами космических кораблей
servers:
  - url: http://localhost:8080
paths:
  /api/v1/orders:
    post:
      summary: Создание заказа
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_order_request'
      responses:
        '200':
          description: Заказ успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create_order_response'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_server_error'
  /api/v1/orders/{order_uuid}:
    get:
      summary: Получить заказ по UUID
      operationId: getOrderByUUID
      parameters:
        - $ref: '#/components/parameters/order_uuid'
      responses:
        '200':
          description: Заказ найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order_dto'
        '404':
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error'
  /api/v1/orders/{order_uuid}/pay:
    post:
      summary: Оплата заказа
      operationId: payOrder
      parameters:
        - $ref: '#/components/parameters/order_uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pay_order_request'
      responses:
        '200':
          description: Успешная оплата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pay_order_response'
        '400':
          description: Неверный статус заказа для проведения оплаты
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_error'
        '404':
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error'
        '500':
          description: Непредвиденная ошибка со стороны сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_server_error'
  /api/v1/orders/{order_uuid}/cancel:
    post:
      summary: Отмена заказа
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/order_uuid'
      responses:
        '204':
          description: Заказ успешно отменен
        '404':
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/not_found_error'
        '409':
          description: Конфликт, заказ уже оплачен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/conflict_error'
components:
  schemas:
    create_order_request:
      type: object
      required:
        - user_uuid
        - part_uuids
      properties:
        user_uuid:
          type: string
          formet: uuid
          description: Уникальный идентификатор пользователяъ
          example: 1b2deb4d-3a7d-4bad-9bdg-2b0d7b3ycb6d
        part_uuids:
          type: array
          description: Список UUID деталей, входящих в заказ
          items:
            type: string
            format: uuid
          example:
            - 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
    create_order_response:
      type: object
      required:
        - order_uuid
        - total_price
      properties:
        order_uuid:
          type: string
          format: uuid
        total_price:
          type: number
          format: double
    generic_error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
    bad_request_error:
      allOf:
        - $ref: '#/components/schemas/generic_error'
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: Bad Request
    internal_server_error:
      allOf:
        - $ref: '#/components/schemas/generic_error'
      type: object
      properties:
        code:
          type: integer
          example: 500
        message:
          type: string
          example: Internal Server Error
    payment_method:
      type: string
      description: Способ оплаты заказа
      enum:
        - UNKNOWN
        - CARD
        - SBP
        - CREDIT_CARD
        - INVESTOR_MONEY
      example: CARD
    order_status:
      type: string
      description: Текущий статус жизненного цикла заказа
      enum:
        - PENDING_PAYMENT
        - PAID
        - CANCELLED
      example: PAID
    order_dto:
      type: object
      required:
        - order_uuid
        - user_uuid
        - part_uuids
        - total_price
        - status
      properties:
        order_uuid:
          type: string
          format: uuid
          description: Уникальный идентификатор заказа
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        user_uuid:
          type: string
          format: uuid
          description: UUID пользователя
          example: 1b2deb4d-3a7d-4bad-9bdg-2b0d7b3ycb6d
        part_uuids:
          type: array
          description: Список UUID деталей
          items:
            type: string
            format: uuid
          example:
            - 1b2deb4d-3a7d-4bad-9bdg-2b0d7b3ycb6d
            - 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        total_price:
          type: number
          format: double
          description: Итоговая стоимость
          example: 123.45
        transaction_uuid:
          type: string
          format: uuid
          description: UUID транзакции (если оплачен)
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        payment_method:
          description: Способ оплаты (присутствует, только если статус PAID)
          allOf:
            - $ref: '#/components/schemas/payment_method'
          nullable: true
        status:
          $ref: '#/components/schemas/order_status'
    not_found_error:
      allOf:
        - $ref: '#/components/schemas/generic_error'
      type: object
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: Not Found
    pay_order_request:
      type: object
      required:
        - payment_method
      properties:
        payment_method:
          $ref: '#/components/schemas/payment_method'
    pay_order_response:
      type: object
      required:
        - transaction_uuid
      properties:
        transaction_uuid:
          type: string
          format: uuid
    conflict_error:
      allOf:
        - $ref: '#/components/schemas/generic_error'
      type: object
      properties:
        code:
          type: integer
          example: 409
        message:
          type: string
          example: Forbidden Error
  parameters:
    order_uuid:
      name: order_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
x-ogen:
  package: order
  target: ./shared/pkg/openapi/order/v1

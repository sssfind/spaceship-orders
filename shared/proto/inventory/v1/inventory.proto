syntax = "proto3";

package inventory.v1;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

option go_package = "order/shared/pkg/proto/inventory/v1";

// Сервис инвентаря
service InventoryService {
  // Получение информации о детали
  rpc GetPart(GetPartRequest) returns (GetPartResponse) {
    option (google.api.http) = {
      get: "/api/v1/inventory/{uuid}"
    };
  }

  rpc ListParts(ListPartsRequest) returns (ListPartsResponse);

}

// Деталь космического корабля
message Part {
  string uuid = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int64 stock_quantity = 5;
  Category category = 6;
  Dimensions dimensions = 7;
  Manufacturer manufacturer = 8;
  repeated string tags = 9;
  map<string, Value> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// Категория детали
enum Category {
  CATEGORY_UNSPECIFIED = 0;
  CATEGORY_ENGINE = 1;
  CATEGORY_FUEL = 2;
  CATEGORY_PORTHOLE = 3;
  CATEGORY_WING = 4;
}

// Габариты детали
message Dimensions {
  double length = 1;
  double width = 2;
  double height = 3;
  double weight = 4;
}

// Информация о производителе
message Manufacturer {
  string name = 1;
  string country = 2;
  string website = 3;
}

// Универсальное значение для метаданных
message Value {
  oneof kind {
    string string_value = 1;
    int64 int64_value = 2;
    double double_value = 3;
    bool bool_value = 4;
  }
}

// Ответ на запрос детали
message GetPartResponse {
  Part part = 1;
}

// Запрос детали по UUID
message GetPartRequest{
  string uuid = 1;
}


// Запрос списка деталей
message ListPartsRequest {
  PartsFilter filter = 1;
}

// Ответ со списком деталей
message ListPartsResponse {
  repeated Part parts = 1;
}

// Фильтр для поиска деталей
message PartsFilter {
  repeated string uuids = 1;
  repeated string names = 2;
  repeated Category categories = 3;
  repeated string manufacturer_countries = 4;
  repeated string tags = 5;
}